<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="spam.css">
</head>
<body>
    <div class="signin-container">
        <div class="blur">
            <div class="login-box">
                <h2>Sign In</h2>
                <input type="text" placeholder="Enter your name!" id="name-input">
                <button type="submit" id="send-name-button">Send</button>
            </div>
        </div>
    </div>
    <div class="container">
    <img src="./image1.png" id="img">
    <button id="btn">click</button>
    </div>
    <div class="score-box">
    <span id="score">0</span>
    </div>
    <div class="login-options">
    <button class="signin-button">Sign in first</button>
    <h2 id="welcome-text"></h2>
    </div>

    <script>
        let btn = document.getElementById("btn");
        let img = document.getElementById("img");
        let gameScore = document.getElementById("score");
        let name;
        let image = 1;
        let score = 0;
        btn.addEventListener("click", function(){
            if(image == 1){
                img.setAttribute("src", "./image1.png");
                image = 2;
            }else if(image == 2){
                img.setAttribute("src", "./image2.png");
                image = 1;
            }
            score +=1;
            gameScore.innerHTML = score;
        });


        let signedIn = false;
        let signInBtn = document.querySelector(".signin-button");
        let signInContainer = document.querySelector(".signin-container");
        let sendNameBtn = document.getElementById("send-name-button");
        btn.disabled = true;

        signInBtn.addEventListener("click", () =>{
            signedIn = true;
            btn.disabled = false;
            signInContainer.style.display = "block";
            localStorage.setItem("signedIn", true);
        })


        async function getData(){
                const response = await fetch("http://localhost:3000/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: localStorage.getItem("name"),
                    score: score
                })

            })
            data = await response.json();
            console.log(data)
        }
        getData();


        let nameInput = document.getElementById("name-input");
        let welcomeText = document.getElementById("welcome-text");
        let data;
        sendNameBtn.addEventListener("click", () =>{
            name = nameInput.value;

            if(data && data.username == nameInput.value){
                alert("This name is already in use!")
            }
            if(data && data.username !== nameInput.value && nameInput.value !== ""){
                localStorage.setItem("name", name)
                signInBtn.innerHTML = "Signed!";
                signInBtn.disabled = true;
                signInBtn.style.display = "none";
                signInContainer.style.display = "none";
                welcomeText.innerHTML = `Welcome, ${name}`;

            }
        });
        let storedName = localStorage.getItem("name");
        if(storedName){
            signInBtn.disabled = true;
            welcomeText.innerHTML = `Welcome, ${name}`;
            btn.disabled = false;
        }else{
            signInBtn.style.display = "block";
            welcomeText.style.display = "none";
            signInBtn.disabled = false;
            sendNameBtn.style.display = "block";

        }
    </script>
</body>
</html>
