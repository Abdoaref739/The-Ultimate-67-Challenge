<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="spam.css">
</head>
<body>
<div class="main-container">
    <div class="container">
    <img src="./image1.png" id="img">
    <button id="btn">click</button>
    </div>



<div id="leaderboard-container">
    <div class="leaderboard-top">
    <div>
        <h2 id="welcome-text"></h2>
        <div class="score-box">
            <span id="score">0</span>
        </div>
        <div class="login-options">
            <button class="signin-button">Sign in first</button>
        </div>
    </div>
    <h1 class="leaderboard-title">Leaderboard!</h1>
    </div>
</div>



    <div class="signin-container">
        <div class="blur">
            <div class="login-box">
                <h2>Sign In</h2>
                <input type="text" placeholder="Enter your name!" id="name-input">
                <button type="submit" id="send-name-button">Send</button>
            </div>
        </div>
    </div>
    </div>








    <script>
        let btn = document.getElementById("btn");
        let img = document.getElementById("img");
        let gameScore = document.getElementById("score");
        let name;
        let image = 1;
        let score = 0;
        btn.addEventListener("click", function(){
            if(image == 1){
                img.setAttribute("src", "./image1.png");
                image = 2;
            }else if(image == 2){
                img.setAttribute("src", "./image2.png");
                image = 1;
            }
            score++;
            gameScore.innerHTML = score;
            getData();
        });

        let signedIn = false;
        let signInBtn = document.querySelector(".signin-button");
        let signInContainer = document.querySelector(".signin-container");
        let sendNameBtn = document.getElementById("send-name-button");
        btn.disabled = true;

        signInBtn.addEventListener("click", () =>{
            signedIn = true;
            btn.disabled = false;
            signInContainer.style.display = "block";
            localStorage.setItem("signedIn", true);
        })


        async function getData(){
                const response = await fetch("http://localhost:3000/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: localStorage.getItem("name"),
                    score: score
                })

            })
            
            data = await response.json();
            console.log(data)
        }


        let nameInput = document.getElementById("name-input");
        let welcomeText = document.getElementById("welcome-text");
        let data;


        
        
        sendNameBtn.addEventListener("click", () =>{
            name = nameInput.value;
            if(data && data.username == nameInput.value){
                alert("This name is already in use!")
            }
                localStorage.setItem("name", name)
                signInBtn.innerHTML = "Signed!";
                signInBtn.disabled = true;
                signInBtn.style.display = "none";
                signInContainer.style.display = "none";
                welcomeText.innerHTML = `Welcome, ${name}`;

        });
        let storedName = localStorage.getItem("name");
        if(storedName){
            signInBtn.disabled = true;
            welcomeText.innerHTML = `Welcome, ${name}`;
            btn.disabled = false;
        }else{
            signInBtn.style.display = "block";
            welcomeText.style.display = "none";
            signInBtn.disabled = false;
            sendNameBtn.style.display = "block";

        }


        let container = document.getElementById("container");
        let leaderBoardContainer = document.getElementById("leaderboard-container");
        let nameSpan = document.querySelector(".name");
        let scoreSpan = document.querySelector(".score");




        async function getLeaderBoardData(){
        let response = await fetch("http://localhost:3000/leaderboard"); 
        let data = await response.json();
        console.log(data)
        let firstBox = document.createElement("div");
        
        
        let firstNameSpan = document.createElement("h1");
        let firstScoreSpan = document.createElement("span");

        leaderBoardContainer.appendChild(firstBox)
        firstBox.appendChild(firstNameSpan)
        firstBox.appendChild(firstScoreSpan)


        firstNameSpan.innerHTML = data[0].username;
        firstScoreSpan.innerHTML = data[0].score;

            for(i = 1; i < data.length; i++){
        let box = document.createElement("div");
        let nameSpan = document.createElement("h1");
        let scoreSpan = document.createElement("span");

        box.classList.add("leaderboard-box");
        firstBox.classList.add("leaderboard-first-box")

        leaderBoardContainer.appendChild(box)
        box.appendChild(nameSpan)
        box.appendChild(scoreSpan)

        nameSpan.innerHTML = data[i].username;
        scoreSpan.innerHTML = data[i].score;
        
        
        }
        
    }
    
        getLeaderBoardData();
    
    </script>
</body>
</html>
