<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .container{
            width: 50%;
            height: 90%;
        }
        .leaderboard-box{
            display: flex;
            align-items: center;
            width: 80%;
            height: 80px;
            background-color: transparent;
            border: 3px solid black;
            box-shadow: 4px 4px 0 black;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 30px;
            padding-left: 30px;
        }
        .leaderboard-box > h1{
            font-size: 40px;
        }
        .leaderboard-box > span{
            margin-left: 70%;
            font-size: 35px;
        }
    </style>
</head>
<body>
    <div id="container">
    </div>
    <script>
        let container = document.getElementById("container");
        let nameSpan = document.querySelector(".name");
        let scoreSpan = document.querySelector(".score");
        async function getData(){
        let response = await fetch("http://localhost:3000/leaderboard"); 
        let data = await response.json();
        console.log(data)
            for(i = 0; i < data.length; i++){
        let box = document.createElement("div");
        let nameSpan = document.createElement("h1");
        let scoreSpan = document.createElement("span");

        box.classList.add("leaderboard-box");

        document.body.appendChild(box);
        box.appendChild(nameSpan)
        box.appendChild(scoreSpan)

        nameSpan.innerHTML = data[i].name;
        scoreSpan.innerHTML = data[i].score;
        }
    }
        getData();
    </script>
</body>
</html>
